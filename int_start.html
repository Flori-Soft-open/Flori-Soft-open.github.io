<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FS Browser start german</title>
    <style>
        body {
            background-image: url(https://github.com/Flori-Soft-open/Flori-Soft-open.github.io/blob/main/background.jpeg?raw=true);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column; /* Stellt sicher, dass die Leiste oben ist */
            height: 100vh; /* Vollständige Höhe des Viewports */
        }
        .header {
            background-color: green; /* Grüne Hintergrundfarbe */
            width: 100%; /* Vollständige Breite */
            padding: 10px; /* Innenabstand */
            display: flex; /* Flexbox für die Anordnung */
            justify-content: flex-end; /* Positioniert den Inhalt nach rechts */
            align-items: center; /* Vertikale Ausrichtung */
        }
        input[type="text"] {
            color: black; /* Textfarbe schwarz */
            background-color: white; /* Hintergrundfarbe des Textfeldes */
            border: 1px solid black; /* Schwarzer Rand */
            padding: 5px; /* Innenabstand */
        }
        button {
            color: black; /* Textfarbe schwarz */
            background-color: white; /* Hintergrundfarbe des Buttons */
            border: 1px solid black; /* Schwarzer Rand */
            padding: 5px 10px; /* Innenabstand */
            cursor: pointer; /* Zeiger-Cursor */
        }
        .squares {
            display: flex; /* Flexbox für die Anordnung der Quadrate */
            margin-top: auto; /* Schiebt die Quadrate nach unten */
            margin-bottom: 20px; /* Abstand vom unteren Rand */
        }
        .square {
            width: 100px; /* Breite der Quadrate */
            height: 100px; /* Höhe der Quadrate */
            margin-right: 10px; /* Abstand zwischen den Quadraten */
        }
        img {
            width: 100%; /* Breite des Bildes anpassen */
            height: auto; /* Automatische Höhe */
        }
    </style>
</head>
<body>
    <div class="header">
        <h1 style="margin: 0; color: black;">Suche mit Ecosia</h1>
        <form action="https://www.ecosia.org/search" method="get">
            <input type="text" name="q" placeholder="Suchbegriff eingeben" required>
            <button type="submit">Suchen</button>
        </form>
    </div>
    <div class="squares">
