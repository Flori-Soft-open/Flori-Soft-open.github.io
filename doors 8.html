<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
    <style>
        /* Der Hintergrund des Modals */
        .modal {
            display: none; 
            position: fixed; 
            z-index: 1; 
            left: 0;
            top: 0;
            width: 100%; 
            height: 100%; 
            overflow: auto; 
            background-color: rgb(0,0,0); 
            background-color: rgba(0,0,0,0.4); 
        }

        /* Modal-Inhalt */
        .modal-content {
            background-color: #fefefe;
            margin: 15% auto; 
            padding: 20px;
            border: 1px solid #888;
            width: 80%; 
        }

        /* Schließen-Button */
        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
        }

        .close:hover,
        .close:focus {
            color: black;
            text-decoration: none;
            cursor: pointer;
        }
    </style>
</head>
<body>





<!-- Das Modal -->
<div id="myModal" class="modal">
    <div class="modal-content">
        <span class="close">&times;</span>
        <h1>Dieses System ist OpenSource:</h1>
        <h6>Doors bassiert auf BSD</h6>
        <h6>der Desktop heißt HTML-Vally und wurde mit HTML geschrieben</h6>
        <h6>das Betriebsystem nutzt ausserdem XORG und ein großer Teil ist auch Mozzila Firefox</h6>
        <img src="https://www.freebsd.org/images/beastie.png" alt="BSD">
    </div>
</div>

<script>
    // Holen Sie sich das Modal
    var modal = document.getElementById("myModal");
    
    // Holen Sie sich den Button, der das Modal öffnet
    var btn = document.getElementById("myBtn");
    
    // Holen Sie sich das Element <span>, das das Modal schließt
    var span = document.getElementsByClassName("close")[0];

    // Wenn der Benutzer auf den Button klickt, öffnet sich das Modal
    btn.onclick = function() {
        modal.style.display = "block";
    }

    // Wenn der Benutzer auf <span> (x) klickt, schließt sich das Modal
    span.onclick = function() {
        modal.style.display = "none";
    }

    // Wenn der Benutzer irgendwo außerhalb des Modals klickt, schließt es sich
    window.onclick = function(event) {
        if (event.target == modal) {
            modal.style.display = "none";
        }
    }
</script>

</body>
</html>
